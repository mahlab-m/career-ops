# Portal Scanner Configuration — Mahlab Maniar
# Target: Strategy & Ops, BizOps, Chief of Staff, Corporate Strategy, GTM Ops, Founder Associate
# Markets: UK (primary), Germany, Netherlands, France, rest of EU, MENA (secondary)
# Seniority: IC and Manager. Excludes intern/junior/graduate/VP/Director/C-level.
# Visa: UK and EU roles require sponsorship — smaller companies without licences filtered out.

# -- Title filter --
title_filter:
  positive:
    - "Strategy"
    - "Operations"
    - "Chief of Staff"
    - "Founder Associate"
    - "Founder's Associate"
    - "BizOps"
    - "Business Operations"
    - "Corporate Strategy"
    - "Corporate Development"      # added 2026-06 — was invisible (no positive coverage)
    - "Strategic Finance"          # added 2026-06 — was invisible
    - "GTM"
    - "Go-to-Market"
    - "Revenue Operations"
    - "RevOps"
    - "Revenue Strategy"           # added 2026-06
    - "Commercial Strategy"        # added 2026-06
    - "Growth Operations"
    - "Growth Strategy"            # added 2026-06 — replaces bare "Growth"
    - "Strategy & Operations"
    - "Strategy and Operations"
    - "Head of Operations"
    - "Head of Strategy"
    - "Market Expansion"           # added 2026-06 — operator/market-entry archetype
    - "Expansion Manager"          # added 2026-06
    - "Transformation"
    - "Strategic Planning"
    - "Commercial Operations"
    - "Business Development"
    - "Planning"
    - "Special Projects"
    # NOTE: bare "Growth" REMOVED 2026-06 — it pulled 124 junk roles
    #   (Growth Engineer/Marketing/PM/Designer). "Growth Operations" +
    #   "Growth Strategy" keep the real fits.
  negative:
    - "Junior"
    - "Intern"
    - "Graduate"
    - "Apprentice"
    - "Trainee"
    - "Entry Level"
    - "Entry-Level"
    - "Vice President"
    - "VP,"
    - "VP "
    - "SVP"
    - "EVP"
    - "C-Level"
    - "Chief Executive"
    - "Chief Financial"
    - "Chief Operating"
    - "Chief Revenue"
    - "Chief Marketing"
    - "Chief People"
    - "Managing Director"
    # "Director," / "Director " REMOVED 2026-06 — killed 30 senior roles incl.
    #   "Associate Director, Strategy & Operations - CEO Office" (London).
    #   For an ex-BCG candidate, Director-of-Strategy roles are worth surfacing;
    #   the JD-read + scoring step rates stretch roles appropriately.
    #   Narrow negatives below kill the junior-director noise instead:
    - "Sales Director"
    - "Engineering Director"
    - "Marketing Director"
    - "Account Manager"
    - "Account Executive"
    - "Customer Success Manager"
    - "Sales Manager"
    - "Sales Representative"
    - "Sales Executive"
    - "Sales Development"           # added — kills SDR
    - "Business Development Representative"  # added — kills BDR, keeps senior BD
    - "Marketing Manager"
    - "Growth Marketing"           # added — kills growth-marketing junk
    - "People Operations"          # added — HR-ops leaking via "Operations"
    - "People Ops"                 # added
    - "HR "
    - "Recruiter"
    - "Talent Acquisition"         # added
    - "Legal Counsel"              # CHANGED from "Legal" — keeps "Legal Operations"
    - "Finance Manager"
    - "Accountant"
    - "Driver"                     # added — kills driver/city-ops
    - "Software Engineer"
    - "Data Engineer"
    - "ML Engineer"
    - "Growth Engineer"            # added
    - "DevOps"
    - "Frontend"
    - "Backend"
    - "Full Stack"
    - "iOS"
    - "Android"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Manager"
    - "Associate"
    - "Principal"

# -- Location filter --
# Added 2026-06. Previously ABSENT → all geos passed → ~42% of scan results
# were US/APAC noise burying the in-target EU/UK/GCC roles.
# Semantics (see scan.mjs buildLocationFilter): always_allow checked first;
# empty/non-string location passes; otherwise must match an `allow` keyword.
# Kept generous (candidate is relocation-flexible). "remote" in always_allow
# may let "US-Remote" through — that's intentional; the JD-read step catches
# US-only roles downstream. Better than dropping legit EU "Remote" postings.
location_filter:
  always_allow:
    - "remote"
    - "emea"
    - "europe"
  allow:
    # UK
    - "london"
    - "united kingdom"
    - "england"
    - "uk"
    # DACH
    - "germany"
    - "berlin"
    - "munich"
    - "münchen"
    - "cologne"
    - "frankfurt"
    - "heidelberg"
    - "hamburg"
    - "austria"
    - "vienna"
    - "switzerland"
    - "zurich"
    - "geneva"
    # France / Benelux
    - "france"
    - "paris"
    - "lyon"
    - "bordeaux"
    - "netherlands"
    - "amsterdam"
    - "belgium"
    - "brussels"
    - "luxembourg"
    # Ireland
    - "ireland"
    - "dublin"
    # Iberia
    - "spain"
    - "madrid"
    - "barcelona"
    - "portugal"
    - "lisbon"
    # Nordics
    - "sweden"
    - "stockholm"
    - "denmark"
    - "copenhagen"
    - "finland"
    - "helsinki"
    # CEE / Baltics
    - "poland"
    - "warsaw"
    - "lithuania"
    - "vilnius"
    - "estonia"
    - "tallinn"
    - "bulgaria"
    - "sofia"
    - "italy"
    - "milan"
    # GCC / MENA (candidate is Doha-based)
    - "dubai"
    - "abu dhabi"
    - "uae"
    - "united arab emirates"
    - "doha"
    - "qatar"
    - "riyadh"
    - "jeddah"
    - "saudi"
    - "ksa"
    - "kuwait"
    - "bahrain"
    - "manama"
    - "cairo"
    - "egypt"
    # APAC (Singapore only — explicit target)
    - "singapore"
  block: []

# -- Search queries --
# Wide-net discovery across ATS platforms and job boards.
# These find companies you don't know yet — the tracked_companies list is just the seed.

search_queries:

  # ── Greenhouse: Strategy & Ops roles ──
  - name: Greenhouse — Strategy & Operations
    query: 'site:job-boards.greenhouse.io "Strategy" "Operations" OR "Strategy & Operations" OR "BizOps" London OR Berlin OR Amsterdam OR Paris OR Remote'
    enabled: true

  - name: Greenhouse — Chief of Staff / Founder Associate
    query: 'site:job-boards.greenhouse.io "Chief of Staff" OR "Founder Associate" OR "Special Projects" London OR Berlin OR Amsterdam OR Paris'
    enabled: true

  - name: Greenhouse — Corporate Strategy / GTM Ops
    query: 'site:job-boards.greenhouse.io "Corporate Strategy" OR "GTM" OR "Go-to-Market" OR "Revenue Operations" London OR Berlin OR Amsterdam OR Paris'
    enabled: true

  - name: Greenhouse — Business Operations / Growth
    query: 'site:job-boards.greenhouse.io "Business Operations" OR "Growth Operations" OR "Strategic Planning" London OR Berlin OR Amsterdam OR Paris OR Remote'
    enabled: true

  # ── Ashby: Strategy & Ops roles ──
  - name: Ashby — Strategy & Ops / Chief of Staff
    query: 'site:jobs.ashbyhq.com "Strategy" OR "Chief of Staff" OR "BizOps" OR "Business Operations" London OR Berlin OR Amsterdam OR Paris OR Remote'
    enabled: true

  - name: Ashby — GTM / RevOps / Growth
    query: 'site:jobs.ashbyhq.com "GTM" OR "Revenue Operations" OR "Go-to-Market" OR "Growth Operations" London OR Berlin OR Amsterdam OR Paris'
    enabled: true

  - name: Ashby — Founder Associate / Special Projects
    query: 'site:jobs.ashbyhq.com "Founder Associate" OR "Special Projects" OR "Corporate Strategy" OR "Transformation"'
    enabled: true

  # ── Lever: Strategy & Ops roles ──
