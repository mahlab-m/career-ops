name: Career-Ops Nightly Scan

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 02:00 Asia/Karachi
  workflow_dispatch: {}      # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - '.github/workflows/nightly.yml'   # trigger when this workflow changes (lets us test it)

permissions:
  contents: write            # allow committing the report back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install scan deps
        run: npm install js-yaml --no-save 2>/dev/null || true
      - name: Run nightly pipeline
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}   # add this secret to enable the Notion push
        run: node nightly-local.mjs
      - name: Commit report + scan history
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/scan-history.tsv data/pipeline.md reports/nightly-*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: nightly scan $(date +%Y-%m-%d) [skip ci]"
            git push origin main
          fi
